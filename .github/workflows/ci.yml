name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run backend tests
        run: uv run pytest -q
      - name: Check whitespace
        run: git diff --check

  mission-control:
    name: Mission Control
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/mission-control/package-lock.json
      - name: Install dependencies
        run: npm --prefix apps/mission-control ci
      - name: Run tests
        run: npm --prefix apps/mission-control run test -- --run
      - name: Typecheck
        run: npm --prefix apps/mission-control run typecheck
      - name: Build
        run: npm --prefix apps/mission-control run build

  trigger:
    name: Trigger
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: trigger/package-lock.json
      - name: Install dependencies
        run: npm --prefix trigger ci
      - name: Typecheck
        run: npm --prefix trigger run typecheck
